<link rel="icon" type="image/png" href="{{ '/assets/images/tone_logo_primary.png' | relative_url }}">
<link rel="shortcut icon" href="{{ '/assets/images/tone_logo_primary.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/images/tone_logo_primary.png' | relative_url }}">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
<meta name="theme-color" content="#080810">
<meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">
{% assign page_keywords = page.tags | default: page.keywords | default: site.keywords %}
{% if page_keywords %}
  <meta name="keywords" content="{% if page_keywords.first %}{{ page_keywords | join: ', ' }}{% else %}{{ page_keywords }}{% endif %}">
{% endif %}
{% include schema.html %}
